# Alle Custom-Datenbanken laufen in diesem Netzwerk.
# Airbyte wird separat gestartet (siehe docs/airbyte-setup.md)
# und verbindet sich über dieses externe Netzwerk mit den DBs.
networks:
  airbyte_net:
    name: airbyte_net
    driver: bridge

services:

  # ─── SOURCE: PostgreSQL mit vorgeladenen Testdaten ────────────────────────
  source-postgres:
    image: postgres:15-alpine
    container_name: hso_source_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SOURCE_PG_DB:-sourcedb}
      POSTGRES_USER: ${SOURCE_PG_USER:-sourceuser}
      POSTGRES_PASSWORD: ${SOURCE_PG_PASSWORD:-sourcepassword}
    volumes:
      - source_pg_data:/var/lib/postgresql/data
      - ./sql/source:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    networks:
      - airbyte_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_PG_USER:-sourceuser} -d ${SOURCE_PG_DB:-sourcedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DESTINATION: PostgreSQL (leer, Airbyte schreibt hierhin) ─────────────
  dest-postgres:
    image: postgres:15-alpine
    container_name: hso_dest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEST_PG_DB:-destdb}
      POSTGRES_USER: ${DEST_PG_USER:-destuser}
      POSTGRES_PASSWORD: ${DEST_PG_PASSWORD:-destpassword}
    volumes:
      - dest_pg_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - airbyte_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEST_PG_USER:-destuser} -d ${DEST_PG_DB:-destdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DESTINATION: MySQL (leer, Airbyte schreibt hierhin) ──────────────────
  dest-mysql:
    image: mysql:8.0
    container_name: hso_dest_mysql
    restart: unless-stopped
    command: --local-infile=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DEST_MYSQL_DB:-destdb}
      MYSQL_USER: ${DEST_MYSQL_USER:-destuser}
      MYSQL_PASSWORD: ${DEST_MYSQL_PASSWORD:-destpassword}
    volumes:
      - dest_mysql_data:/var/lib/mysql
      - ./sql/dest-mysql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - airbyte_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FILE SERVER: CSV-Flatfiles per HTTP browsebar -------------------------
  #   Zweck: HTTP-Browsing/-Download der Dateien unter http://localhost:8888/
  #   (z. B. zum Pruefen der Rohdaten).
  #
  #   WICHTIG: Der Airbyte File-Connector liest NICHT ueber diesen Server und NICHT
  #   aus oss_local_root. Unter abctl (Kubernetes/kind) sehen die Connector-Pods das
  #   Volume nicht; stattdessen mountet setup-airbyte.ps1 das Verzeichnis
  #   sql/source/data via `abctl local install --volume ...:/local` direkt als /local
  #   (Details: docs/airbyte-setup.md Abschnitt 7). Der Copy-Schritt unten ist Legacy
  #   und fuer den File-Connector nicht mehr noetig.
  file-server:
    image: nginx:alpine
    container_name: hso_fileserver
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c",
      "cp /data/*.csv /local/ 2>/dev/null && echo '[file-server] CSVs in oss_local_root kopiert' || echo '[file-server] oss_local_root nicht beschreibbar - uebersprungen'; nginx -g 'daemon off;'"
    ]
    volumes:
      - ./sql/source/data:/usr/share/nginx/html:ro
      - ./sql/source/data:/data:ro
      - ./docker/fileserver/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - oss_local_root:/local
    ports:
      - "8888:80"
    networks:
      - airbyte_net
    healthcheck:
      # 127.0.0.1 statt localhost: "localhost" loest im Container zuerst auf ::1 (IPv6) auf,
      # nginx lauscht hier aber nur auf IPv4 (0.0.0.0:80) -> sonst dauerhaft "unhealthy".
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/k_plz.csv"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- POSTGREST: Low-Code REST-API auf die Ziel-DB (Szenario 6a) -------------
  #   Generiert automatisch eine REST-API aus dem Schema der dest-postgres.
  #   Beispiel:  GET http://localhost:3000/k_plz?limit=5
  #   (Lesezugriff via anon-Rolle = destuser; Schreibzugriff braucht JWT-Setup.)
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: hso_postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${DEST_PG_USER:-destuser}:${DEST_PG_PASSWORD:-destpassword}@dest-postgres:5432/${DEST_PG_DB:-destdb}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${DEST_PG_USER:-destuser}
      PGRST_SERVER_PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - airbyte_net
    depends_on:
      - dest-postgres

volumes:
  source_pg_data:
  dest_pg_data:
  dest_mysql_data:
  # Externes Volume von Airbyte (abctl) - wird beim ersten Start von setup-airbyte.ps1 erstellt.
  # Muss existieren bevor docker compose up aufgerufen wird.
  # Falls nicht vorhanden: file-server startet trotzdem, Copy-Schritt wird uebersprungen.
  oss_local_root:
    external: true
